<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HabitCore - Admin</title>
    <link rel="stylesheet" href="../assets/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard">
    <div class="dashboard-wrapper">
        <!-- SIDEBAR (simplificado para admin) -->
        <aside class="sidebar">
            <h2><i class="fa-solid fa-fire"></i> HabitCore Admin</h2>
            <ul>
                <li id="menu-admin-dashboard" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</li>
                <li id="menu-admin-usuarios"><i class="fa-solid fa-users"></i> Usuarios</li>
                <li id="menu-admin-categorias"><i class="fa-solid fa-tags"></i> Categorías</li>
                <li id="menu-admin-habitos"><i class="fa-solid fa-list-check"></i> Hábitos</li>
                <li id="menu-admin-registros"><i class="fa-solid fa-clipboard-check"></i> Registros</li>
                <li id="btn-cerrar-sesion"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</li>
            </ul>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="content">
            <div class="topbar">
                <div class="topbar-left">
                    <h1>Panel de Administración</h1>
                    <p class="subtitle">Bienvenido, <span id="nombre-admin">Admin</span></p>
                </div>
            </div>

            <!-- Aquí se cargará el contenido dinámico según la pestaña -->
            <div id="admin-content" class="admin-content"></div>
        </main>
    </div>

    <!-- MODALES (los necesarios para crear/editar usuarios, categorías, etc.) -->
    <!-- Modal para crear/editar usuario -->
    <div class="modal" id="modal-usuario">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-usuario-titulo">Nuevo usuario</h2>
                <button class="close-btn" id="cerrar-modal-usuario">&times;</button>
            </div>
            <form id="form-usuario" class="modal-form">
                <input type="hidden" id="usuario-id">
                <div class="form-group">
                    <label>Nombre de usuario</label>
                    <input type="text" id="usuario-nombre" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="usuario-email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña (dejar en blanco para no cambiar)</label>
                    <input type="password" id="usuario-password">
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="usuario-rol">
                        <option value="usuario">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelar-modal-usuario">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para crear/editar categoría -->
    <div class="modal" id="modal-categoria">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-categoria-titulo">Nueva categoría</h2>
                <button class="close-btn" id="cerrar-modal-categoria">&times;</button>
            </div>
            <form id="form-categoria" class="modal-form">
                <input type="hidden" id="categoria-id">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="categoria-nombre" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="categoria-descripcion" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelar-modal-categoria">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal confirmar eliminación (reutilizable) -->
    <div class="modal" id="modal-confirmar">
        <div class="modal-content" style="max-width:420px;">
            <div class="modal-header">
                <h2 id="confirm-titulo">Confirmar</h2>
                <button class="close-btn" id="cerrar-confirmar">&times;</button>
            </div>
            <div class="modal-body" style="padding:20px;">
                <p id="confirm-mensaje"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="cancelar-confirmar">Cancelar</button>
                <button type="button" class="btn-primary" id="confirmar-accion">Sí, eliminar</button>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
