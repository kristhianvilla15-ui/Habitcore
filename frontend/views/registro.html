<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HabitCore - Registro</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-wrapper">
    <!-- IZQUIERDA -->
    <div class="auth-container">
        <h2>HabitCore</h2>
        <p>Crea tu cuenta y empieza a construir hábitos</p>

        <form id="form-registro">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="nombre" placeholder="Nombre de usuario" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>

            <div class="input-group input-group-password">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="button" class="toggle-password" id="toggle-password-registro" aria-label="Mostrar contraseña">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <div class="auth-link">
            ¿Ya tienes cuenta?
            <a href="login.html">Iniciar sesión</a>
        </div>
    </div>

    <!-- DERECHA (igual que login) -->
    <div class="logo-side">
        <div class="logo-content">
            <img src="../assets/logo.png" alt="HabitCore Logo">
            <h1 class="hero-text">
                Construye disciplina.
                <span>Domina tu día.</span>
            </h1>
            <p class="hero-sub">
                Pequeños hábitos diarios crean resultados extraordinarios.
            </p>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
